services:
  - type: web
    name: diya-collection
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://diya-collection.onrender.com
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: LOG_LEVEL
        value: error
